<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0A1628">
<meta name="description" content="Annuaire Cadence Architectes — cartes de visite de l'équipe.">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Annuaire — Cadence Architectes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--gold:#C9A95C;--azure:#60A5FA;--ink:#0A1628;--muted:#94A3B8;--text:#E2E8F0;--line:rgba(255,255,255,.08);}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);
    background:
      radial-gradient(ellipse at 12% -10%, #14224a 0%, transparent 55%),
      radial-gradient(ellipse at 88% 0%, #0f2447 0%, transparent 50%),
      linear-gradient(180deg,#0A1628,#020617);
    min-height:100vh;padding:34px 18px 70px;
  }
  .wrap{max-width:1120px;margin:0 auto}

  /* En-tête */
  .head{text-align:center;margin-bottom:38px}
  .brand{display:inline-flex;align-items:center;gap:14px;justify-content:center}
  .brand .mark{height:42px;display:flex;align-items:center}
  .brand .mark img{height:42px;width:auto;filter:brightness(0) invert(1)}
  .brand .mark.logo-missing{display:none}
  .brand .word{display:flex;flex-direction:column;line-height:1;text-align:left}
  .brand .word b{font-family:'Space Grotesk';font-weight:700;letter-spacing:.18em;font-size:22px}
  .brand .word i{font-style:normal;letter-spacing:.34em;font-size:10px;color:var(--gold);margin-top:5px}
  .kicker{font-family:'Space Grotesk';font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--azure);margin-top:26px}
  .head h1{font-family:'Space Grotesk';font-weight:700;font-size:clamp(26px,5vw,40px);letter-spacing:-.5px;margin-top:8px;
    background:linear-gradient(90deg,#fff,#9fc2f5);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .head p{color:var(--muted);margin-top:10px;font-size:14px}
  .rule{width:140px;height:1.5px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:18px auto 0}

  /* Sections */
  .section-title{font-family:'Space Grotesk';font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);
    margin:42px 0 18px;display:flex;align-items:center;gap:14px}
  .section-title::after{content:"";flex:1;height:1px;background:var(--line)}

  /* Grille de vignettes */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:18px}
  .tile{
    display:flex;flex-direction:column;align-items:center;text-align:center;text-decoration:none;color:inherit;
    background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:18px;padding:22px 16px 18px;
    transition:transform .15s,border-color .15s,background .15s;
  }
  .tile:hover{transform:translateY(-4px);border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.06)}
  .tile .ph{
    width:96px;height:96px;border-radius:50%;object-fit:cover;background:#16233a;
    box-shadow:0 0 0 2px var(--gold),0 10px 22px rgba(0,0,0,.45);
  }
  .tile .ph.fallback{display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;font-size:30px;color:#fff}
  .tile .nm{font-family:'Space Grotesk';font-weight:700;font-size:16px;margin-top:14px;letter-spacing:-.2px}
  .tile .fn{color:var(--gold);font-size:11.5px;margin-top:5px;line-height:1.35}
  .tile .go{margin-top:12px;font-size:11px;letter-spacing:.04em;color:var(--azure);opacity:0;transition:opacity .15s}
  .tile:hover .go{opacity:1}

  .foot{text-align:center;color:#64748B;font-size:12px;margin-top:56px;letter-spacing:.02em}
  .foot a{color:var(--azure);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <header class="head">
    <div class="brand">
      <span class="mark" id="brandMark"></span>
      <span class="word"><b>CADENCE</b><i>ARCHITECTES&nbsp;ASSOCIÉS</i></span>
    </div>
    <div class="kicker">Annuaire</div>
    <h1>Cartes de visite de l'équipe</h1>
    <p>Choisissez un membre pour ouvrir sa carte — partage par QR, vCard et lien.</p>
    <div class="rule"></div>
  </header>

  <main id="sections"></main>

  <footer class="foot">
    Cadence Architectes Associés · Paris 12<sup>e</sup> · <a href="index.html">Créer / éditer une carte</a>
  </footer>
</div>

<script src="assets/js/profiles.js"></script>
<script>
(function(){
  "use strict";
  var esc = function(s){return String(s||'').replace(/[<>&"]/g,function(c){return({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]);});};

  // Logo officiel (masqué proprement si absent)
  var mark = document.getElementById('brandMark');
  mark.innerHTML = '<img src="assets/logo-cadence.svg" alt="Cadence" onerror="this.parentNode.classList.add(\'logo-missing\')">';

  function initials(name){
    return (name||'').trim().split(/\s+/).map(function(w){return w[0];}).slice(0,2).join('').toUpperCase();
  }
  function tile(p){
    var href = 'index.html?p=' + encodeURIComponent(p.id);
    var photo = (p.photo!==undefined?p.photo:'assets/photos/'+p.id+'.jpg');
    var a = document.createElement('a');
    a.className='tile'; a.href=href;
    a.innerHTML =
      '<img class="ph" src="'+photo+'" alt="'+esc(p.name)+'" '+
        'onerror="this.outerHTML=\'<div class=&quot;ph fallback&quot;>'+initials(p.name)+'</div>\'">'+
      '<div class="nm">'+esc(p.name)+'</div>'+
      '<div class="fn">'+esc(p.title||'')+'</div>'+
      '<div class="go">Ouvrir la carte →</div>';
    return a;
  }

  var root = document.getElementById('sections');
  ['associes','salaries'].forEach(function(g){
    var list = PROFILES.filter(function(p){return p.group===g;});
    if(!list.length) return;
    var h = document.createElement('div');
    h.className='section-title';
    h.textContent = (GROUP_LABELS[g]||g) + ' · ' + list.length;
    root.appendChild(h);
    var grid = document.createElement('div');
    grid.className='grid';
    list.forEach(function(p){ grid.appendChild(tile(p)); });
    root.appendChild(grid);
  });
})();
</script>
</body>
</html>
